<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Delivery Orchestrator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0f0; }
    header { text-align: center; padding: 80px 20px 40px; background: linear-gradient(135deg, #1a1a2e, #16213e); }
    header h1 { font-size: 2.8rem; color: #7c83fd; letter-spacing: 1px; }
    header p { margin-top: 16px; font-size: 1.2rem; color: #a0a8c0; max-width: 600px; margin-left: auto; margin-right: auto; }
    section { padding: 60px 20px; max-width: 900px; margin: 0 auto; }
    h2 { font-size: 1.6rem; color: #7c83fd; margin-bottom: 30px; text-align: center; }
    .steps { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; }
    .step { background: #1a1a2e; border: 1px solid #2a2a4e; border-radius: 10px; padding: 20px 24px; width: 130px; text-align: center; }
    .step .num { font-size: 1.4rem; color: #7c83fd; font-weight: bold; }
    .step .label { margin-top: 8px; font-size: 0.95rem; color: #c0c8e0; }
    .stack { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
    .tech { background: #1a1a2e; border: 1px solid #2a2a4e; border-radius: 10px; padding: 18px 30px; font-size: 1rem; color: #a0f0c0; font-weight: 600; }
    .cta { text-align: center; padding: 50px 20px 80px; }
    .cta a { background: #7c83fd; color: #fff; text-decoration: none; padding: 16px 40px; border-radius: 8px; font-size: 1.1rem; font-weight: 600; transition: background 0.2s; }
    .cta a:hover { background: #5a62f0; }
    footer { text-align: center; padding: 20px; color: #444466; font-size: 0.85rem; border-top: 1px solid #1a1a2e; }
  </style>
</head>
<body>
  <header>
    <h1>AI Delivery Orchestrator</h1>
    <p>Automate your software delivery pipeline end-to-end with AI-powered orchestration.</p>
  </header>

  <section>
    <h2>Delivery Workflow</h2>
    <div class="steps">
      <div class="step"><div class="num">1</div><div class="label">Intake</div></div>
      <div class="step"><div class="num">2</div><div class="label">Build</div></div>
      <div class="step"><div class="num">3</div><div class="label">Review</div></div>
      <div class="step"><div class="num">4</div><div class="label">Deploy</div></div>
      <div class="step"><div class="num">5</div><div class="label">QA</div></div>
      <div class="step"><div class="num">6</div><div class="label">Approval</div></div>
    </div>
  </section>

  <section>
    <h2>Tech Stack</h2>
    <div class="stack">
      <div class="tech">SuperPlane</div>
      <div class="tech">Claude AI</div>
      <div class="tech">Jira</div>
      <div class="tech">GitHub</div>
    </div>
  </section>

  <div class="cta">
    <a href="https://github.com/milanp93/ai-auto-dev-app-live" target="_blank">Get Started on GitHub</a>
  </div>

  <footer>AI Delivery Orchestrator &mdash; KAN-1 &copy; 2024</footer>
</body>
</html>
