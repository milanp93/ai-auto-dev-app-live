<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Delivery Orchestrator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0d0d0d; color: #f0f0f0; }
    .hero { text-align: center; padding: 80px 20px 60px; background: linear-gradient(135deg, #0d0d0d 0%, #1a1a2e 100%); }
    .hero h1 { font-size: 2.8rem; font-weight: 700; color: #7c3aed; margin-bottom: 16px; }
    .hero p { font-size: 1.2rem; color: #a0a0b0; max-width: 560px; margin: 0 auto 32px; }
    .cta-btn { background: #7c3aed; color: #fff; border: none; padding: 14px 36px; border-radius: 8px; font-size: 1rem; cursor: pointer; text-decoration: none; transition: background 0.2s; }
    .cta-btn:hover { background: #5b21b6; }
    section { padding: 60px 20px; max-width: 900px; margin: 0 auto; }
    h2 { font-size: 1.6rem; color: #c4b5fd; margin-bottom: 32px; text-align: center; }
    .steps { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; }
    .step { background: #1a1a2e; border: 1px solid #2d2d4e; border-radius: 10px; padding: 20px 24px; width: 140px; text-align: center; }
    .step .num { font-size: 1.4rem; color: #7c3aed; font-weight: 700; margin-bottom: 8px; }
    .step .label { font-size: 0.95rem; color: #d0d0e0; }
    .stack { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
    .tech { background: #1a1a2e; border: 1px solid #2d2d4e; border-radius: 10px; padding: 18px 28px; font-size: 1rem; color: #c4b5fd; font-weight: 600; }
    footer { text-align: center; padding: 24px; color: #555; font-size: 0.85rem; border-top: 1px solid #1e1e30; }
  </style>
</head>
<body>
  <div class="hero">
    <h1>AI Delivery Orchestrator</h1>
    <p>Automate your entire software delivery pipeline — from intake to deployment — powered by AI.</p>
    <a href="#workflow" class="cta-btn">See How It Works</a>
  </div>

  <section id="workflow">
    <h2>Delivery Workflow</h2>
    <div class="steps">
      <div class="step"><div class="num">1</div><div class="label">Intake</div></div>
      <div class="step"><div class="num">2</div><div class="label">Build</div></div>
      <div class="step"><div class="num">3</div><div class="label">Review</div></div>
      <div class="step"><div class="num">4</div><div class="label">Deploy</div></div>
      <div class="step"><div class="num">5</div><div class="label">QA</div></div>
      <div class="step"><div class="num">6</div><div class="label">Approval</div></div>
    </div>
  </section>

  <section id="stack">
    <h2>Tech Stack</h2>
    <div class="stack">
      <div class="tech">SuperPlane</div>
      <div class="tech">Claude AI</div>
      <div class="tech">Jira</div>
      <div class="tech">GitHub</div>
    </div>
  </section>

  <footer>&copy; 2024 AI Delivery Orchestrator &mdash; KAN-1</footer>
</body>
</html>
